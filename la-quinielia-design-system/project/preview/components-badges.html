<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--lq-bg-base); padding: 28px; font-family: var(--lq-font-body); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--lq-text-muted); margin-bottom: 10px; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px; border-radius: 9999px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  }
  .badge-teal    { background: rgba(20,184,166,0.12);  color: #2dd4bf; }
  .badge-gold    { background: rgba(245,158,11,0.12);  color: #fbbf24; }
  .badge-success { background: rgba(34,197,94,0.12);   color: #4ade80; }
  .badge-danger  { background: rgba(239,68,68,0.12);   color: #f87171; }
  .badge-blue    { background: rgba(59,130,246,0.12);  color: #60a5fa; }
  .badge-neutral { background: rgba(255,255,255,0.06); color: #94a3b8; }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Pill pick badges */
  .pick { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; font-family: var(--lq-font-display); font-size: 15px; font-weight: 700; }
  .pick-1 { background: rgba(20,184,166,0.15); color: #2dd4bf; border: 1px solid rgba(20,184,166,0.3); }
  .pick-x { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .pick-2 { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }

  /* Tag chips */
  .tag { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; background: rgba(255,255,255,0.05); color: var(--lq-text-secondary); border: 1px solid var(--lq-border-default); }
</style>
</head>
<body>
  <div class="section-label">Status Badges</div>
  <div class="row">
    <span class="badge badge-teal"><span class="badge-dot"></span>Active</span>
    <span class="badge badge-gold"><span class="badge-dot"></span>High Confidence</span>
    <span class="badge badge-success"><span class="badge-dot"></span>Correct Pick</span>
    <span class="badge badge-danger"><span class="badge-dot"></span>Wrong Pick</span>
    <span class="badge badge-blue"><span class="badge-dot"></span>Info</span>
    <span class="badge badge-neutral">Neutral</span>
  </div>

  <div class="section-label">Quiniela Pick Badges</div>
  <div class="row">
    <span class="pick pick-1">1</span>
    <span class="pick pick-x">X</span>
    <span class="pick pick-2">2</span>
    <span style="font-size:13px; color:var(--lq-text-muted); margin-left:8px">Local / Empate / Visitante</span>
  </div>

  <div class="section-label">Strategy Tags</div>
  <div class="row">
    <span class="tag">Conservadora</span>
    <span class="tag">Arriesgada</span>
    <span class="tag">Alta Confianza</span>
    <span class="tag">LaLiga</span>
    <span class="tag">Jornada 28</span>
  </div>
</body>
</html>
