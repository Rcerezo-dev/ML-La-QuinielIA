<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--lq-bg-base); padding: 24px; font-family: var(--lq-font-body); }
  .grid { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .token { width: 110px; font-size: 11px; font-family: var(--lq-font-mono); color: var(--lq-text-muted); flex-shrink: 0; }
  .px-label { width: 40px; font-size: 11px; color: var(--lq-text-secondary); text-align: right; flex-shrink: 0; }
  .bar { height: 16px; background: var(--lq-gradient-brand); border-radius: 4px; opacity: 0.8; }
</style>
</head>
<body>
  <div class="grid">
    <div class="row"><div class="token">--lq-space-1</div><div class="bar" style="width:4px"></div><div class="px-label">4px</div></div>
    <div class="row"><div class="token">--lq-space-2</div><div class="bar" style="width:8px"></div><div class="px-label">8px</div></div>
    <div class="row"><div class="token">--lq-space-3</div><div class="bar" style="width:12px"></div><div class="px-label">12px</div></div>
    <div class="row"><div class="token">--lq-space-4</div><div class="bar" style="width:16px"></div><div class="px-label">16px</div></div>
    <div class="row"><div class="token">--lq-space-5</div><div class="bar" style="width:20px"></div><div class="px-label">20px</div></div>
    <div class="row"><div class="token">--lq-space-6</div><div class="bar" style="width:24px"></div><div class="px-label">24px</div></div>
    <div class="row"><div class="token">--lq-space-8</div><div class="bar" style="width:32px"></div><div class="px-label">32px</div></div>
    <div class="row"><div class="token">--lq-space-10</div><div class="bar" style="width:40px"></div><div class="px-label">40px</div></div>
    <div class="row"><div class="token">--lq-space-12</div><div class="bar" style="width:48px"></div><div class="px-label">48px</div></div>
    <div class="row"><div class="token">--lq-space-16</div><div class="bar" style="width:64px"></div><div class="px-label">64px</div></div>
    <div class="row"><div class="token">--lq-space-20</div><div class="bar" style="width:80px"></div><div class="px-label">80px</div></div>
    <div class="row"><div class="token">--lq-space-24</div><div class="bar" style="width:96px"></div><div class="px-label">96px</div></div>
  </div>
</body>
</html>
