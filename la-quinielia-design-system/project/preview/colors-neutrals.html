<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--lq-bg-base); padding: 24px; font-family: var(--lq-font-body); }
  .grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .swatch { border-radius: var(--lq-radius-md); overflow: hidden; width: 120px; }
  .swatch-color { height: 64px; width: 100%; }
  .swatch-info { padding: 8px; background: var(--lq-bg-surface); border: 1px solid var(--lq-border-default); border-top: none; border-radius: 0 0 var(--lq-radius-md) var(--lq-radius-md); }
  .swatch-name { font-size: 12px; font-weight: 600; color: var(--lq-text-primary); }
  .swatch-hex  { font-size: 11px; color: var(--lq-text-muted); font-family: var(--lq-font-mono); }
  .row-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--lq-text-muted); margin: 20px 0 8px; }
</style>
</head>
<body>
  <div class="row-label">Navy — Background Scale</div>
  <div class="grid">
    <div class="swatch"><div class="swatch-color" style="background:#0f172a"></div><div class="swatch-info"><div class="swatch-name">Navy 900 ★</div><div class="swatch-hex">#0f172a</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#1e293b"></div><div class="swatch-info"><div class="swatch-name">Navy 800 ★</div><div class="swatch-hex">#1e293b</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#263348"></div><div class="swatch-info"><div class="swatch-name">Navy 700</div><div class="swatch-hex">#263348</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#2e3f5a"></div><div class="swatch-info"><div class="swatch-name">Navy 600</div><div class="swatch-hex">#2e3f5a</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#3b4f6b"></div><div class="swatch-info"><div class="swatch-name">Navy 500</div><div class="swatch-hex">#3b4f6b</div></div></div>
  </div>

  <div class="row-label">Slate — Text Scale</div>
  <div class="grid">
    <div class="swatch"><div class="swatch-color" style="background:#f1f5f9"></div><div class="swatch-info"><div class="swatch-name">Slate 100</div><div class="swatch-hex">#f1f5f9</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#cbd5e1"></div><div class="swatch-info"><div class="swatch-name">Slate 300</div><div class="swatch-hex">#cbd5e1</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#94a3b8"></div><div class="swatch-info"><div class="swatch-name">Slate 400 ★</div><div class="swatch-hex">#94a3b8</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#64748b"></div><div class="swatch-info"><div class="swatch-name">Slate 500</div><div class="swatch-hex">#64748b</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#475569"></div><div class="swatch-info"><div class="swatch-name">Slate 600</div><div class="swatch-hex">#475569</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#334155"></div><div class="swatch-info"><div class="swatch-name">Slate 700</div><div class="swatch-hex">#334155</div></div></div>
  </div>
</body>
</html>
