<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--lq-bg-base); padding: 24px; font-family: var(--lq-font-body); }
  .table-wrap { border-radius: var(--lq-radius-lg); overflow: hidden; border: 1px solid var(--lq-border-default); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: rgba(20,184,166,0.07); }
  th {
    padding: 10px 14px; text-align: left;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--lq-text-muted); border-bottom: 1px solid var(--lq-border-default);
  }
  td { padding: 11px 14px; font-size: 13px; color: var(--lq-text-primary); border-bottom: 1px solid rgba(255,255,255,0.03); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:nth-child(odd) { background: rgba(255,255,255,0.015); }
  tbody tr:hover { background: rgba(20,184,166,0.05); }

  .pick { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; font-family: var(--lq-font-display); font-size: 13px; font-weight: 700; }
  .pick-1 { background: rgba(20,184,166,0.15); color: #2dd4bf; }
  .pick-x { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .pick-2 { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .prog { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-top: 3px; min-width: 60px; }
  .prog-fill { height: 100%; border-radius: 2px; }
  .conf-high { color: #4ade80; font-weight: 600; }
  .conf-med  { color: #fbbf24; font-weight: 600; }
  .conf-low  { color: #94a3b8; }
</style>
</head>
<body>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Partido</th>
          <th>P(1)</th>
          <th>P(X)</th>
          <th>P(2)</th>
          <th>Pick</th>
          <th>Conf.</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><div style="font-weight:600">R. Madrid vs Barça</div><div style="font-size:11px;color:var(--lq-text-muted)">Jornada 28</div></td>
          <td><div>65%</div><div class="prog"><div class="prog-fill" style="width:65%;background:var(--lq-gradient-brand)"></div></div></td>
          <td><div>20%</div><div class="prog"><div class="prog-fill" style="width:20%;background:#94a3b8"></div></div></td>
          <td><div>15%</div><div class="prog"><div class="prog-fill" style="width:15%;background:#475569"></div></div></td>
          <td><span class="pick pick-1">1</span></td>
          <td class="conf-high">65%</td>
        </tr>
        <tr>
          <td><div style="font-weight:600">Atlético vs Sevilla</div><div style="font-size:11px;color:var(--lq-text-muted)">Jornada 28</div></td>
          <td><div>42%</div><div class="prog"><div class="prog-fill" style="width:42%;background:var(--lq-gradient-brand)"></div></div></td>
          <td><div>35%</div><div class="prog"><div class="prog-fill" style="width:35%;background:#94a3b8"></div></div></td>
          <td><div>23%</div><div class="prog"><div class="prog-fill" style="width:23%;background:#475569"></div></div></td>
          <td><span class="pick pick-x">X</span></td>
          <td class="conf-med">42%</td>
        </tr>
        <tr>
          <td><div style="font-weight:600">Valencia vs Betis</div><div style="font-size:11px;color:var(--lq-text-muted)">Jornada 28</div></td>
          <td><div>28%</div><div class="prog"><div class="prog-fill" style="width:28%;background:var(--lq-gradient-brand)"></div></div></td>
          <td><div>30%</div><div class="prog"><div class="prog-fill" style="width:30%;background:#94a3b8"></div></div></div></td>
          <td><div>42%</div><div class="prog"><div class="prog-fill" style="width:42%;background:#60a5fa"></div></div></td>
          <td><span class="pick pick-2">2</span></td>
          <td class="conf-low">42%</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
