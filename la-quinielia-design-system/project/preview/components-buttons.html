<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--lq-bg-base); padding: 28px; font-family: var(--lq-font-body); }
  .section { margin-bottom: 24px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--lq-text-muted); margin-bottom: 12px; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; background: var(--lq-color-primary); color: #0f172a;
    font-family: var(--lq-font-body); font-size: 14px; font-weight: 600;
    border: none; border-radius: 10px; cursor: pointer;
    transition: all 150ms cubic-bezier(0.16,1,0.3,1);
  }
  .btn-primary:hover { background: #2dd4bf; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(20,184,166,0.35); }

  .btn-accent {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; background: var(--lq-color-accent); color: #0f172a;
    font-family: var(--lq-font-body); font-size: 14px; font-weight: 600;
    border: none; border-radius: 10px; cursor: pointer;
    transition: all 150ms cubic-bezier(0.16,1,0.3,1);
  }
  .btn-accent:hover { background: var(--lq-gold-400); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,158,11,0.35); }

  .btn-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; background: transparent; color: var(--lq-text-primary);
    font-family: var(--lq-font-body); font-size: 14px; font-weight: 500;
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer;
    transition: all 150ms cubic-bezier(0.16,1,0.3,1);
  }
  .btn-secondary:hover { background: rgba(20,184,166,0.08); border-color: rgba(20,184,166,0.4); transform: translateY(-1px); }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; background: transparent; color: var(--lq-color-primary);
    font-family: var(--lq-font-body); font-size: 14px; font-weight: 500;
    border: none; border-radius: 10px; cursor: pointer;
    transition: all 150ms cubic-bezier(0.16,1,0.3,1);
  }
  .btn-ghost:hover { background: rgba(20,184,166,0.08); }

  .btn-danger {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; background: rgba(239,68,68,0.12); color: #f87171;
    font-family: var(--lq-font-body); font-size: 14px; font-weight: 600;
    border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; cursor: pointer;
    transition: all 150ms cubic-bezier(0.16,1,0.3,1);
  }

  .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
  .btn-lg { padding: 14px 28px; font-size: 16px; border-radius: 12px; }
  .btn-icon { padding: 10px; border-radius: 10px; }
  .btn-disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="section">
    <div class="section-label">Variants</div>
    <div class="btn-row">
      <button class="btn-primary">Generar Quiniela</button>
      <button class="btn-accent">Entrenar Modelo</button>
      <button class="btn-secondary">Cargar Datos</button>
      <button class="btn-ghost">Ver Historial</button>
      <button class="btn-danger">Reiniciar</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Sizes</div>
    <div class="btn-row">
      <button class="btn-primary btn-sm">Pequeño</button>
      <button class="btn-primary">Normal</button>
      <button class="btn-primary btn-lg">Grande</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">States</div>
    <div class="btn-row">
      <button class="btn-primary">Normal</button>
      <button class="btn-primary" style="background:#2dd4bf; transform:translateY(-1px); box-shadow:0 4px 16px rgba(20,184,166,0.35)">Hover</button>
      <button class="btn-primary" style="transform:scale(0.97)">Pressed</button>
      <button class="btn-primary btn-disabled" disabled>Disabled</button>
    </div>
  </div>
</body>
</html>
